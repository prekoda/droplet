<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Droplet Chat</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body class="light">

<div id="chat-app">
  <!-- HEADER -->
  <div id="header">
    <h2>Droplet Chat</h2>
    <div id="right-controls" class="d-flex align-items-center gap-2">
      <button id="themeToggle" class="btn btn-outline-secondary btn-sm"><i class="bi bi-moon-fill"></i></button>
      <div class="dropdown">
        <button class="btn btn-outline-secondary btn-sm dropdown-toggle" id="usersToggle" data-bs-toggle="dropdown" aria-expanded="false">
          <i class="bi bi-people-fill"></i>
        </button>
        <ul id="usersList" class="dropdown-menu"></ul>
      </div>
      <span id="username" class="ms-2 fw-bold"></span>
    </div>
  </div>

  <!-- MESSAGES -->
  <div id="messages"></div>

  <!-- INPUT AREA -->
  <div id="input-area">
    <div id="reply-preview" class="d-none">
      Replying to: <span id="reply-text"></span> <button id="cancel-reply" class="btn btn-sm btn-danger ms-2">×</button>
    </div>
    <div class="d-flex gap-2">
      <input id="msgInput" type="text" placeholder="Type a message..." autofocus>
      <input type="file" id="fileInput" accept="image/*" style="display:none;">
      <button id="attachBtn" class="btn btn-outline-secondary"><i class="bi bi-paperclip"></i></button>
      <button id="sendBtn" class="btn btn-primary"><i class="bi bi-send-fill"></i></button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
